spring:
  application:
    name: tempoup-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/tempoup}
    username: ${DB_USERNAME:tempoup}
    password: ${DB_PASSWORD:tempoup}

  jpa:
    hibernate:
      # Flyway owns the schema. Never let Hibernate touch DDL.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        # Tell Hibernate which spatial dialect to use for PostGIS
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    # Baseline BELOW V1 so a fresh/empty database still runs V1__init_schema.
    # (With the default baseline version of 1, Flyway treats V1 as already
    #  applied on an empty DB and skips creating the tables.)
    baseline-version: 0
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

# Application-specific settings
app:
  jwt:
    # IMPORTANT: override this in production via env var. Must be at least 32 bytes for HS256.
    secret: ${JWT_SECRET:change-me-in-production-this-needs-to-be-at-least-256-bits-long-okay}
    access-token-ttl-minutes: ${JWT_ACCESS_TTL:60}
    refresh-token-ttl-days: ${JWT_REFRESH_TTL:30}
  cors:
    # React Native / Expo dev origins; tighten for production
    allowed-origins: ${CORS_ORIGINS:http://localhost:8081,http://localhost:19006,exp://127.0.0.1:19000}
  matching:
    default-radius-km: ${MATCH_RADIUS_KM:50}
    max-feed-size: ${MATCH_FEED_SIZE:30}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: ${SQL_LOG:info}
